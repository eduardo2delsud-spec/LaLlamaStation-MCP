version: "3.8"
name: "lallamastation"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: mcp-ollama-motor
    ports:
      - "11434:11434"
    # habilita acceso a GPU para Ollama; este es el contenedor que realmente hace inferencia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mcp-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    volumes:
      - ollama_data:/root/.ollama:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - APP_PORT=${APP_PORT:-3000}
      - API_KEY=${API_KEY:-super-secret-mcp-key}
      - NGROK_CONTAINER_NAME=mcp-ngrok-tunnel
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    # habilita acceso a GPU si el host y Docker lo soportan
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # alternativa simplificada en Compose 3.8+:
    # gpus: all
    networks:
      - mcp-network
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mcp-ngrok-tunnel
    depends_on:
      - backend
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - backend:${APP_PORT:-3000}
    networks:
      - mcp-network
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8080:80"
    environment:
      # inside docker the backend is reachable by service name
      - VITE_API_URL=http://backend:${APP_PORT:-3000}
      - VITE_SOCKET_URL=http://backend:${APP_PORT:-3000}
    networks:
      - mcp-network
    depends_on:
      - backend
    restart: always

  mcp-brain:
    build:
      context: ./mcp-brain
      dockerfile: Dockerfile
    container_name: brain
    volumes:
      - brain_data:/root/.brain
    networks:
      - mcp-network
    restart: always

networks:
  mcp-network:
    driver: bridge

volumes:
  ollama_data:
  brain_data:
