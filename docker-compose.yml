version: "3.8"
name: "lallamaollama"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: mcp-ollama-motor
    ports:
      - "11434:11434"
    # habilita acceso a GPU para Ollama; este es el contenedor que realmente hace inferencia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mcp-network
    restart: no

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    volumes:
      - ollama_data:/root/.ollama:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - APP_PORT=${APP_PORT:-3016}
      - API_KEY=${API_KEY:-super-secret-mcp-key}
      - NGROK_CONTAINER_NAME=mcp-ngrok-tunnel
    ports:
      - "${APP_PORT:-3016}:${APP_PORT:-3016}"
    # habilita acceso a GPU si el host y Docker lo soportan
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # alternativa simplificada en Compose 3.8+:
    # gpus: all
    networks:
      - mcp-network
    restart: no

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mcp-ngrok-tunnel
    depends_on:
      - backend
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - backend:${APP_PORT:-3016}
    networks:
      - mcp-network
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:${APP_PORT:-3016}
        - VITE_SOCKET_URL=http://localhost:${APP_PORT:-3016}
        - VITE_BRAIN_API_URL=http://localhost:${BRAIN_PORT:-3015}
    container_name: frontend
    ports:
      - "8080:80"
    environment:
      # inside docker the backend is reachable by service name
      - VITE_API_URL=http://localhost:${APP_PORT:-3016}
      - VITE_SOCKET_URL=http://localhost:${APP_PORT:-3016}
    networks:
      - mcp-network
    depends_on:
      - backend
    restart: always

  mcp-brain:
    build:
      context: ./mcp-brain
      dockerfile: Dockerfile
    container_name: brain
    ports:
      - "${BRAIN_PORT:-3015}:${BRAIN_PORT:-3015}"
    environment:
      - BRAIN_PORT=${BRAIN_PORT:-3015}
      - OLLAMA_API_URL=http://ollama:11434
      # - API_KEY=${API_KEY:-super-secret-mcp-key} # Descomenta si habilitas seguridad en el cerebro
    volumes:
      # OPCIÓN A (Recomendada - Bind Mount al Host):
      # Conecta la carpeta local de Windows './data' con '/app/data' dentro de Docker.
      # Permite que el Dashboard y los agentes del IDE compartan exactamente el mismo archivo SQLite (lallama-memory.db).
      - ./data:/app/data

      # OPCIÓN B (Aislada - Volumen Virtual de Docker):
      # Si prefieres que la base de datos viva de forma completamente aislada dentro del motor de Docker
      # (sin tocar tu disco en Windows), comenta la línea de arriba y descomenta la siguiente:
      # - brain_data:/app/data
    depends_on:
      - ollama
    networks:
      - mcp-network
    restart: always

networks:
  mcp-network:
    driver: bridge

volumes:
  ollama_data:
  brain_data:
